# Render.com Blueprint - AvtoHelp backend + PostgreSQL(PostGIS)
# Foydalanish: Render -> New -> Blueprint -> shu repo -> Apply

databases:
  - name: avtohelp-db
    databaseName: avtoassist
    plan: free        # sinov uchun; doimiy uchun: starter

services:
  - type: web
    name: avtohelp-api
    runtime: node
    plan: free        # sinov uchun; doimiy uchun: starter
    rootDir: avtoassist/backend
    buildCommand: npm install
    # migratsiyalar avtomatik (faqat bir marta), keyin server
    startCommand: npm run migrate && node server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      # Render bazasidan ichki ulanish manzili (SSL kerak emas)
      - key: DATABASE_URL
        fromDatabase:
          name: avtohelp-db
          property: connectionString
      - key: DB_SSL
        value: "false"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: "7d"
