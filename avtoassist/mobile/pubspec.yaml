name: avtoassist
description: AvtoHelp - Avtomobil yordamchisi
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # UI
  cupertino_icons: ^1.0.6
  flutter_svg: ^2.0.9
  
  # State Management
  provider: ^6.1.1
  
  # Network
  http: ^1.1.2
  dio: ^5.4.0
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Maps - Offline support
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  cached_network_image: ^3.3.1
  location: ^5.0.3
  geolocator: ^10.1.0
  
  # WebSocket
  socket_io_client: ^2.0.3+1
  
  # Utils
  intl: ^0.18.1
  flutter_spinkit: ^5.2.0
  flutter_rating_bar: ^4.0.1
  url_launcher: ^6.2.2
  permission_handler: ^11.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
