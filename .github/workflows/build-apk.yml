name: Build Android APK

on:
  push:
    branches: [ main ]
    paths:
      - 'avtoassist/mobile/**'
  workflow_dispatch:

jobs:
  build:
    name: Build APK
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '17'
      
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.6'
          channel: 'stable'
      
      - name: Flutter Doctor
        working-directory: ./avtoassist/mobile
        run: |
          flutter --version
          flutter doctor -v
      
      - name: Get Flutter dependencies
        working-directory: ./avtoassist/mobile
        run: |
          flutter clean
          flutter pub get
      
      - name: Analyze
        working-directory: ./avtoassist/mobile
        run: flutter analyze || true
      
      - name: Build APK
        working-directory: ./avtoassist/mobile
        run: flutter build apk --release --no-tree-shake-icons
      
      - name: Rename APK
        run: |
          cp avtoassist/mobile/build/app/outputs/flutter-apk/app-release.apk \
             avtohelp-v${{ github.run_number }}.apk
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: avtohelp-apk
          path: avtohelp-v${{ github.run_number }}.apk
      
      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: AvtoHelp v1.0.${{ github.run_number }}
          files: avtohelp-v${{ github.run_number }}.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
